<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2a2520">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<title>Whakatu Listening Station</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: #2a2520;
  overflow: hidden;
  touch-action: none;
}

#app {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
}

/* ── stage ── */
#stage {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 12px 20px 4px;
  background: #2a2520;
}

/* ── card (sleeve + record together) ── */
#card {
  position: relative;
  width: 260px;
  height: 260px;
  will-change: transform, opacity;
}

#card.out-left  { animation: outLeft  0.26s ease forwards; }
#card.out-right { animation: outRight 0.26s ease forwards; }
#card.in-left   { animation: inLeft   0.26s ease forwards; }
#card.in-right  { animation: inRight  0.26s ease forwards; }

@keyframes outLeft  { to { transform: translateX(-140%) rotate(-6deg); opacity: 0; } }
@keyframes outRight { to { transform: translateX(140%)  rotate(6deg);  opacity: 0; } }
@keyframes inLeft   { from { transform: translateX(140%)  rotate(6deg);  opacity: 0; } to { transform: var(--tilt, rotate(0deg)); opacity: 1; } }
@keyframes inRight  { from { transform: translateX(-140%) rotate(-6deg); opacity: 0; } to { transform: var(--tilt, rotate(0deg)); opacity: 1; } }

/* ── vinyl record ── */
#record {
  position: absolute;
  top: 2%;
  width: 80%;
  height: 80%;
  transition: right 0.6s cubic-bezier(.4,0,.2,1);
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%,
    #111 0%, #111 13%,
    #555 13.5%, #111 15%,
    #444 18%, #111 21%,
    #444 25%, #111 29%,
    #444 33%, #111 38%,
    #444 43%, #111 48%,
    #333 50%
  );
  box-shadow: 0 6px 28px rgba(0,0,0,0.85);
  will-change: transform;
  transform: rotate(0deg);
}

/* grooves */
#record::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: repeating-conic-gradient(
    rgba(255,255,255,0.07) 0deg,
    rgba(0,0,0,0) 1.5deg,
    rgba(0,0,0,0) 3deg,
    rgba(255,255,255,0.07) 4.5deg
  );
}

/* centre label */
#record::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 26%; height: 26%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, #d4b06a 0%, #8b6914 55%, #4a3006 100%);
  z-index: 1;
  box-shadow: 0 1px 4px rgba(0,0,0,0.6);
}

/* ── album sleeve ── */
#sleeve {
  position: absolute;
  top: 0;
  left: 0;
  width: 84%;
  height: 84%;
  border-radius: 4px;
  overflow: hidden;
  z-index: 2;
  background: #1a1a1a;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.9),
    0 3px 10px rgba(0,0,0,0.7),
    inset 0 0 0 1px rgba(255,255,255,0.05);
}

#sleeve-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

#sleeve-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  color: #2a2a2a;
  background: #141414;
}

/* ── dots ── */
#track-dots {
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 5px;
  padding: 5px 16px;
  min-height: 18px;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #3a3530;
  border: 1px solid #504840;
  transition: background 0.2s, transform 0.2s;
  cursor: pointer;
  flex-shrink: 0;
}

.dot.active {
  background: #c8a96e;
  border-color: #c8a96e;
  transform: scale(1.4);
}

/* ── controls bar ── */
#controls-bar {
  flex-shrink: 0;
  background: #1c1814;
  border-top: 1px solid #302820;
  padding: 7px 10px 9px;
}

/* LCD title */
#title-wrap {
  width: 100%;
  overflow: hidden;
  margin-bottom: 7px;
  position: relative;
  height: 1.6em;
  background: #040d04;
  border: 1px solid #162016;
  border-radius: 3px;
  padding: 2px 8px;
}

#title-wrap::before,
#title-wrap::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 20px;
  z-index: 2;
  pointer-events: none;
}
#title-wrap::before { left: 0;  background: linear-gradient(to right, #040d04, transparent); }
#title-wrap::after  { right: 0; background: linear-gradient(to left,  #040d04, transparent); }

#track-title {
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  font-size: 14px;
  color: #44ee44;
  text-shadow: 0 0 8px rgba(68,238,68,0.6);
  white-space: nowrap;
  display: inline-block;
  line-height: 1.6em;
}

@keyframes marquee {
  0%          { transform: translateX(100%); }
  100%        { transform: translateX(var(--mdist)); }
}

/* controls row: logo | buttons | fullscreen */
#controls-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

#footer-logo {
  height: 34px;
  width: auto;
  flex-shrink: 0;
  display: block;
  opacity: 0.85;
}

#buttons {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.ctrl-btn {
  background: #1a1714;
  border: 2px solid #3a3530;
  color: #c8a96e;
  border-radius: 8px;
  width: 60px;
  height: 40px;
  font-size: 17px;
  line-height: 36px;
  text-align: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

.ctrl-btn.active {
  background: #2a2010;
  border-color: #c8a96e;
  box-shadow: 0 0 10px rgba(200,169,110,0.3);
}

#fullscreen-btn {
  background: none;
  border: none;
  color: #4a4035;
  font-size: 22px;
  cursor: pointer;
  padding: 4px 6px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.15s;
}
#fullscreen-btn:active { color: #c8a96e; }

#version {
  font-size: 8px;
  color: #1c1814;
  text-align: right;
  margin-top: 3px;
  font-family: monospace;
}
</style>
</head>
<body>
<div id="app">

  <div id="stage">
    <div id="card">
      <div id="record"></div>
      <div id="sleeve">
        <img id="sleeve-img" src="" alt="">
        <div id="sleeve-placeholder">♪</div>
      </div>
    </div>
  </div>

  <div id="track-dots"></div>

  <div id="controls-bar">
    <div id="title-wrap"><span id="track-title"></span></div>
    <div id="controls-row">
      <img id="footer-logo" src="logo.png" alt="WAA" onerror="this.style.display='none'">
      <div id="buttons">
        <div class="ctrl-btn" id="prev-btn">&#9664;&#9664;</div>
        <div class="ctrl-btn" id="play-btn">&#9654;</div>
        <div class="ctrl-btn" id="next-btn">&#9654;&#9654;</div>
      </div>
      <button id="fullscreen-btn">&#x26F6;</button>
    </div>
    <div id="version">v2.7</div>
  </div>

</div>
<audio id="player" preload="none"></audio>

<script>
var tracks   = [];
var idx      = 0;
var playing  = false;
var player   = document.getElementById('player');
var card     = document.getElementById('card');
var record   = document.getElementById('record');
var sleeveImg     = document.getElementById('sleeve-img');
var sleevePH      = document.getElementById('sleeve-placeholder');
var trackTitleEl  = document.getElementById('track-title');
var playBtn       = document.getElementById('play-btn');
var dotsEl        = document.getElementById('track-dots');

var tilts = [
  'rotate(-3deg)', 'rotate(2deg)',  'rotate(-5deg)',
  'rotate(4deg)',  'rotate(-2deg)', 'rotate(5deg)',
  'rotate(-4deg)', 'rotate(3deg)',  'rotate(-1deg)',
  'rotate(6deg)',  'rotate(-3deg)'
];

// ── card sizing ───────────────────────────────────────────────────────────────

function sizeCard() {
  var stage = document.getElementById('stage');
  var w = stage.clientWidth  - 48;
  var h = stage.clientHeight - 16;
  var size = Math.min(w, h, 340);
  card.style.width  = size + 'px';
  card.style.height = size + 'px';
}
window.addEventListener('resize', function() { sizeCard(); if (!playing) recordOut(); else recordIn(); });
sizeCard();
// set initial record position after size is known
setTimeout(function() { recordOut(); }, 0);

// ── record spin ───────────────────────────────────────────────────────────────

var spinAngle = 0;
var spinSpeed = 0;
var spinRAF   = null;
var lastTS    = null;

function spinLoop(ts) {
  if (!lastTS) lastTS = ts;
  var dt = Math.min(ts - lastTS, 64);
  lastTS = ts;
  spinAngle = (spinAngle + spinSpeed * (dt / 16.67)) % 360;
  record.style.transform = 'rotate(' + spinAngle + 'deg)';
  if (spinSpeed > 0.004) {
    spinRAF = requestAnimationFrame(spinLoop);
  } else {
    spinSpeed = 0; spinRAF = null; lastTS = null;
  }
}

function recordOut() {
  // position record hidden behind sleeve — use px based on card size
  var size = parseInt(card.style.width) || 260;
  record.style.right = Math.round(size * 0.20) + 'px';
}

function recordIn() {
  // position record peeking out right
  var size = parseInt(card.style.width) || 260;
  record.style.right = Math.round(size * -0.18) + 'px';
}

function startSpin() {
  recordIn();
  if (!spinRAF) { lastTS = null; spinRAF = requestAnimationFrame(spinLoop); }
  (function accel() {
    if (spinSpeed < 0.45) { spinSpeed = Math.min(spinSpeed * 1.09 + 0.004, 0.45); setTimeout(accel, 16); }
  })();
}

function stopSpin() {
  recordOut();
  (function decel() {
    if (spinSpeed > 0.004) { spinSpeed *= 0.96; setTimeout(decel, 16); }
    else spinSpeed = 0;
  })();
}

// ── marquee ───────────────────────────────────────────────────────────────────

function updateMarquee() {
  var wrap = document.getElementById('title-wrap');
  var el   = trackTitleEl;
  // force reflow to restart animation
  el.style.animation = 'none';
  el.style.transform = 'translateX(0)';
  void el.offsetWidth; // trigger reflow
  requestAnimationFrame(function() {
    var wrapW = wrap.clientWidth;
    var textW = el.scrollWidth;
    // always scroll — start off right edge, scroll to past left edge
    var totalDist = wrapW + textW;
    var dur = Math.max(5, totalDist / 80); // px per second
    el.style.setProperty('--mdist', '-' + (textW + 20) + 'px');
    el.style.animation = 'marquee ' + dur + 's linear 0.5s infinite';
  });
}

// ── dots ──────────────────────────────────────────────────────────────────────

function buildDots() {
  dotsEl.innerHTML = '';
  tracks.forEach(function(_, i) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : '');
    d.addEventListener('click', function() { playTrack(i, null); });
    dotsEl.appendChild(d);
  });
}

function updateDots() {
  dotsEl.querySelectorAll('.dot').forEach(function(d, i) {
    d.className = 'dot' + (i === idx ? ' active' : '');
  });
}

// ── sleeve image ──────────────────────────────────────────────────────────────

function setSleeveImage(src) {
  if (src) {
    sleeveImg.src = src;
    sleeveImg.style.display = 'block';
    sleevePH.style.display = 'none';
  } else {
    sleeveImg.style.display = 'none';
    sleevePH.style.display  = 'flex';
  }
}

// ── show track ────────────────────────────────────────────────────────────────

function applyTilt() {
  var t = tilts[idx % tilts.length];
  card.style.setProperty('--tilt', t);
  card.style.transform = t;
}

function showTrack(i, dir) {
  idx = ((i % tracks.length) + tracks.length) % tracks.length;
  var t = tracks[idx];
  trackTitleEl.textContent = t.title;
  player.src = t.audio;
  updateDots();
  updateMarquee();

  if (dir) {
    // slide whole card (sleeve + record) out together
    card.className = dir === 'next' ? 'out-left' : 'out-right';
    // snap record hidden immediately (no transition) so it arrives hidden
    record.style.transition = 'none';
    recordOut();
    setTimeout(function() {
      record.style.transition = '';
      applyTilt();
      if (t.image) {
        var img = new Image();
        img.onload  = slideIn;
        img.onerror = slideIn;
        img.src = t.image;
      } else {
        slideIn();
      }
      function slideIn() {
        setSleeveImage(t.image || '');
        card.className = dir === 'next' ? 'in-left' : 'in-right';
        setTimeout(function() { card.className = ''; applyTilt(); }, 280);
      }
    }, 240);
  } else {
    card.className = '';
    setSleeveImage(t.image || '');
    applyTilt();
    // snap record to correct position without transition
    record.style.transition = 'none';
    recordOut();
    setTimeout(function() { record.style.transition = ''; }, 50);
  }
}

// ── playback ──────────────────────────────────────────────────────────────────

function setPlayBtn(p) {
  playBtn.innerHTML = p ? '&#9646;&#9646;' : '&#9654;';
}

function haptic(ms) {
  try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e) {}
}

function playTrack(i, dir) {
  showTrack(i, dir);
  playing = true;
  setPlayBtn(true);
  startSpin();
  player.play().catch(function() {
    playing = false;
    setPlayBtn(false);
    stopSpin();
  });
}

player.addEventListener('ended', function() {
  if (playing) playTrack(idx + 1, 'next');
});

player.addEventListener('pause', function() {
  if (!playing) stopSpin();
});

player.addEventListener('play', function() {
  if (playing) startSpin();
});

// ── buttons ───────────────────────────────────────────────────────────────────

function flash(id) {
  var el = document.getElementById(id);
  el.classList.add('active');
  setTimeout(function() { el.classList.remove('active'); }, 180);
}

document.getElementById('prev-btn').addEventListener('click', function() {
  flash('prev-btn'); haptic(30);
  if (player.currentTime > 3) { player.currentTime = 0; if (playing) player.play(); }
  else playTrack(idx - 1, 'prev');
});

playBtn.addEventListener('click', function() {
  flash('play-btn'); haptic(40);
  if (playing) {
    playing = false; player.pause(); setPlayBtn(false); stopSpin();
  } else {
    playTrack(idx, null);
  }
});

document.getElementById('next-btn').addEventListener('click', function() {
  flash('next-btn'); haptic(30);
  playTrack(idx + 1, 'next');
});

// ── fullscreen ────────────────────────────────────────────────────────────────

var fsBtn = document.getElementById('fullscreen-btn');

fsBtn.addEventListener('click', function() {
  var el = document.documentElement;
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
  }
});

function onFSChange() {
  fsBtn.innerHTML = (document.fullscreenElement || document.webkitFullscreenElement) ? '&#x2715;' : '&#x26F6;';
}
document.addEventListener('fullscreenchange',       onFSChange);
document.addEventListener('webkitfullscreenchange', onFSChange);
document.addEventListener('mozfullscreenchange',    onFSChange);

// ── swipe ─────────────────────────────────────────────────────────────────────

var sx = 0, sy = 0, sActive = false;

document.addEventListener('touchstart', function(e) {
  sx = e.touches[0].clientX;
  sy = e.touches[0].clientY;
  sActive = true;
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (!sActive) return;
  if (Math.abs(e.touches[0].clientY - sy) > Math.abs(e.touches[0].clientX - sx)) sActive = false;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!sActive) return;
  sActive = false;
  var dx = e.changedTouches[0].clientX - sx;
  var dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) < 48 || Math.abs(dy) > Math.abs(dx)) return;
  haptic(20);
  if (dx < 0) {
    playTrack(idx + 1, 'next');
  } else {
    if (player.currentTime > 3) { player.currentTime = 0; if (playing) player.play(); }
    else playTrack(idx - 1, 'prev');
  }
}, { passive: true });

// ── load tracks ───────────────────────────────────────────────────────────────

var xhr = new XMLHttpRequest();
xhr.open('GET', 'tracks.json?v=' + Date.now(), true);
xhr.onload = function() {
  if (xhr.status === 200) {
    try { tracks = JSON.parse(xhr.responseText); } catch(e) {}
    if (tracks.length) { buildDots(); showTrack(0, null); }
  }
};
xhr.send();

// ── service worker ────────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
</body>
</html>
