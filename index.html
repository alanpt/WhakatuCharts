<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Whakatu Listening Station</title>
<style>
* {
  -webkit-box-sizing: border-box;
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  overflow: hidden;
}

#art-area {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 15%;
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-orient: vertical;
  -webkit-box-direction: normal;
  -ms-flex-direction: column;
  flex-direction: column;
  -webkit-box-align: center;
  -ms-flex-align: center;
  align-items: center;
  -webkit-box-pack: center;
  -ms-flex-pack: center;
  justify-content: center;
  padding: 16px 16px 8px;
}

#header {
  text-align: center;
  margin-bottom: 12px;
  -ms-flex-negative: 0;
  flex-shrink: 0;
}

#station-name {
  font-family: Courier New, serif;
  font-size: 23px;
  color: white;
  letter-spacing: 2px;
}

#month-label {
  font-family: Arial, sans-serif;
  font-size: 14px;
  color: #6b6560;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 8px;
}

#artwork-wrap {
  -webkit-box-flex: 1;
  -ms-flex: 1;
  flex: 1;
  width: 100%;
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-align: center;
  -ms-flex-align: center;
  align-items: center;
  -webkit-box-pack: center;
  -ms-flex-pack: center;
  justify-content: center;
  min-height: 0;
  cursor: pointer;
}

#artwork {
  display: block;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  background: #111;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#controls-bar {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 15%;
  background: #111;
  border-top: 1px solid #2a2a2a;
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-orient: vertical;
  -webkit-box-direction: normal;
  -ms-flex-direction: column;
  flex-direction: column;
  -webkit-box-pack: center;
  -ms-flex-pack: center;
  justify-content: center;
  padding: 6px 12px;
}

#track-title {
  font-family: Arial, sans-serif;
  font-size: 20px;
  color: #f0ece4;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  margin-bottom: 6px;
  min-height: 1.2em;
}

#controls-row {
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-align: center;
  -ms-flex-align: center;
  align-items: center;
}

#logo-wrap {
  -ms-flex-negative: 0;
  flex-shrink: 0;
  margin-right: 12px;
}

#logo {
  height: 36px;
  width: auto;
  display: block;
}

#buttons {
  -webkit-box-flex: 1;
  -ms-flex: 1;
  flex: 1;
  display: -webkit-box;
  display: -ms-flexbox;
  display: flex;
  -webkit-box-pack: center;
  -ms-flex-pack: center;
  justify-content: center;
  -webkit-box-align: center;
  -ms-flex-align: center;
  align-items: center;
}

#status-wrap {
  -ms-flex-negative: 0;
  flex-shrink: 0;
  width: 44px;
  text-align: right;
}

#status {
  font-family: Arial, sans-serif;
  font-size: 10px;
  color: #6b6560;
  line-height: 1.3;
}

.ctrl-btn {
  background: #2a2a2a;
  border: 2px solid #666;
  color: #f0ece4;
  border-radius: 10px;
  width: 68px;
  height: 40px;
  font-size: 20px;
  line-height: 36px;
  text-align: center;
  margin: 0 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

.ctrl-btn.active {
  background: #3a3a3a;
  border-color: #c8a96e;
}

#playstop-btn.playing {
  border-color: #c8a96e;
  color: #c8a96e;
}
</style>
</head>
<body>

<div id="art-area">
  <div id="header">
    <div id="station-name">Whakatū Hits Listening Station</div>
    <div id="month-label"></div>
  </div>
  <div id="artwork-wrap">
    <img id="artwork" src="" alt="">
  </div>
</div>

<div id="controls-bar">
  <div id="track-title"></div>
  <div id="controls-row">
    <div id="logo-wrap">
      <img id="logo" src="logo.png" alt="Whakatu" onerror="this.style.display='none'">
    </div>
    <div id="buttons">
      <div class="ctrl-btn" id="prev-btn">&#9664;&#9664;</div>
      <div class="ctrl-btn" id="playstop-btn">&#9654;</div>
      <div class="ctrl-btn" id="next-btn">&#9654;&#9654;</div>
    </div>
    <div id="status-wrap">
      <span id="status"> </span>
    </div>
  </div>
</div>

<audio id="player"></audio>

<script>
var months = ['January','February','March','April','May','June',
  'July','August','September','October','November','December'];
document.getElementById('month-label').innerHTML =
  'Hits of ' + months[new Date().getMonth()];

var tracks = [];
var idx = 0;
var isPlaying = false;
var audioUnlocked = false;
var pendingPlay = false;

var player = document.getElementById('player');
var artwork = document.getElementById('artwork');
var trackTitle = document.getElementById('track-title');
var status = document.getElementById('status');
var playstopBtn = document.getElementById('playstop-btn');

// Old iOS requires audio to be triggered synchronously in a touch event.
// We unlock the audio context on the very first touch anywhere on the page.
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  player.load();
  // If something was waiting to play, play it now
  if (pendingPlay) {
    pendingPlay = false;
    player.play();
  }
}
document.addEventListener('touchstart', unlockAudio, false);
document.addEventListener('click', unlockAudio, false);

function setPlayingState(playing) {
  isPlaying = playing;
  if (playing) {
    playstopBtn.innerHTML = '&#9646;&#9646;';
    playstopBtn.className = 'ctrl-btn playing';
  } else {
    playstopBtn.innerHTML = '&#9654;';
    playstopBtn.className = 'ctrl-btn';
  }
}

function loadTracks() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'tracks.json?v=' + new Date().getTime(), true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try { tracks = JSON.parse(xhr.responseText); }
        catch(e) { tracks = []; }
        if (tracks.length > 0) {
          status.innerHTML = '';
          showTrack(0);
        } else {
          status.innerHTML = 'No tracks';
        }
      } else {
        status.innerHTML = 'Error ' + xhr.status;
      }
    }
  };
  xhr.send();
}

// showTrack only updates UI and src — does not attempt to play
function showTrack(i) {
  idx = ((i % tracks.length) + tracks.length) % tracks.length;
  var t = tracks[idx];
  trackTitle.innerHTML = t.title;
  if (t.image) {
    artwork.src = t.image;
    artwork.style.display = 'block';
  } else {
    artwork.style.display = 'none';
  }
  player.src = t.audio;
  player.load();
  setPlayingState(false);
}

// playTrack updates UI and plays — must be called from a touch/click handler
function playTrack(i) {
  idx = ((i % tracks.length) + tracks.length) % tracks.length;
  var t = tracks[idx];
  trackTitle.innerHTML = t.title;
  if (t.image) {
    artwork.src = t.image;
    artwork.style.display = 'block';
  } else {
    artwork.style.display = 'none';
  }
  player.src = t.audio;
  player.load();

  if (audioUnlocked) {
    player.play();
    setPlayingState(true);
  } else {
    // Will play as soon as first touch unlocks audio
    pendingPlay = true;
    setPlayingState(false);
    status.innerHTML = 'Tap to play';
  }
}

function doPlay() {
  if (audioUnlocked) {
    player.play();
    setPlayingState(true);
    status.innerHTML = '';
  } else {
    pendingPlay = true;
    status.innerHTML = 'Tap to play';
  }
}

player.addEventListener('ended', function() {
  playTrack(idx + 1);
});

player.addEventListener('pause', function() {
  if (!pendingPlay) setPlayingState(false);
});

player.addEventListener('play', function() {
  setPlayingState(true);
  status.innerHTML = '';
});

// Play/stop toggle
playstopBtn.addEventListener('click', function() {
  if (isPlaying) {
    player.pause();
    player.currentTime = 0;
    setPlayingState(false);
  } else {
    doPlay();
  }
});

function flashBtn(id) {
  var el = document.getElementById(id);
  var prev = el.className;
  el.className = 'ctrl-btn active';
  setTimeout(function() { el.className = prev; }, 200);
}

document.getElementById('prev-btn').addEventListener('click', function() {
  flashBtn('prev-btn');
  if (player.currentTime > 3) {
    player.currentTime = 0;
    if (isPlaying) player.play();
  } else {
    playTrack(idx - 1);
  }
});

document.getElementById('next-btn').addEventListener('click', function() {
  flashBtn('next-btn');
  playTrack(idx + 1);
});

// Tap artwork = play/pause toggle
var artWrap = document.getElementById('artwork-wrap');

artWrap.addEventListener('click', function() {
  if (isPlaying) {
    player.pause();
  } else {
    doPlay();
  }
});

// Swipe on artwork
var swipeStartX = 0;
var swipeStartY = 0;
var swipeMoved = false;

artWrap.addEventListener('touchstart', function(e) {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swipeMoved = false;
}, false);

artWrap.addEventListener('touchmove', function(e) {
  swipeMoved = true;
}, false);

artWrap.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - swipeStartX;
  var dy = e.changedTouches[0].clientY - swipeStartY;

  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    // Definite horizontal swipe — suppress the click event that follows
    swipeMoved = true;
    if (dx < 0) {
      playTrack(idx + 1);
    } else {
      if (player.currentTime > 3) {
        player.currentTime = 0;
        if (isPlaying) player.play();
      } else {
        playTrack(idx - 1);
      }
    }
  }
}, false);

// Block the click that fires after a swipe
artWrap.addEventListener('click', function(e) {
  if (swipeMoved) {
    swipeMoved = false;
    return;
  }
  if (isPlaying) {
    player.pause();
  } else {
    doPlay();
  }
}, false);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

loadTracks();
</script>
</body>
</html>
