<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Whakatu Listening Station</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  overflow: hidden;
  touch-action: pan-y;
}

/* ── layout ── */
#app {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
}

/* ── header ── */
#header {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 16px 8px;
  background: #0a0a0a;
}

#logo {
  height: 48px;
  width: auto;
  display: block;
  margin-bottom: 8px;
}

#station-name {
  font-family: 'Courier New', monospace;
  font-size: 15px;
  color: #f0ece4;
  letter-spacing: 2px;
  text-align: center;
  text-transform: uppercase;
}

#month-label {
  font-family: Arial, sans-serif;
  font-size: 11px;
  color: #6b6560;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── artwork area ── */
#artwork-wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 16px;
  overflow: hidden;
  position: relative;
}

#artwork {
  display: block;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  background: #111;
  transition: transform 0.25s ease, opacity 0.25s ease;
  will-change: transform;
}

/* swipe animation classes */
#artwork.swipe-left  { transform: translateX(-110%); opacity: 0; }
#artwork.swipe-right { transform: translateX(110%);  opacity: 0; }
#artwork.swipe-in-left  { animation: slideInLeft  0.25s ease forwards; }
#artwork.swipe-in-right { animation: slideInRight 0.25s ease forwards; }

@keyframes slideInLeft  { from { transform: translateX(110%);  opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideInRight { from { transform: translateX(-110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── track indicator dots ── */
#track-dots {
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  padding: 4px 16px;
  min-height: 20px;
  flex-wrap: wrap;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #333;
  transition: background 0.2s, transform 0.2s;
  flex-shrink: 0;
}

.dot.active {
  background: #c8a96e;
  transform: scale(1.3);
}

/* ── controls bar ── */
#controls-bar {
  flex-shrink: 0;
  background: #111;
  border-top: 1px solid #2a2a2a;
  padding: 8px 12px;
}

#track-title {
  font-family: Arial, sans-serif;
  font-size: 18px;
  color: #f0ece4;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 8px;
  min-height: 1.2em;
}

#controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#buttons {
  display: flex;
  align-items: center;
  gap: 10px;
}

.ctrl-btn {
  background: #2a2a2a;
  border: 2px solid #666;
  color: #f0ece4;
  border-radius: 10px;
  width: 64px;
  height: 40px;
  font-size: 18px;
  line-height: 36px;
  text-align: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, border-color 0.15s;
}

.ctrl-btn.active {
  background: #3a3a3a;
  border-color: #c8a96e;
}

#fullscreen-btn {
  background: none;
  border: none;
  color: #555;
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  line-height: 1;
}

#fullscreen-btn:active { color: #c8a96e; }

#version {
  font-family: Arial, sans-serif;
  font-size: 9px;
  color: #1e1e1e;
  letter-spacing: 1px;
  text-align: right;
  margin-top: 4px;
}
</style>
</head>
<body>

<div id="app">

  <div id="header">
    <img id="logo" src="logo.png" alt="WAA" onerror="this.style.display='none'">
    <div id="station-name">Whakatū's Latest Hits</div>
    <div id="month-label"></div>
  </div>

  <div id="artwork-wrap">
    <img id="artwork" src="" alt="">
  </div>

  <div id="track-dots"></div>

  <div id="controls-bar">
    <div id="track-title"></div>
    <div id="controls-row">
      <div id="buttons">
        <div class="ctrl-btn" id="prev-btn">&#9664;&#9664;</div>
        <div class="ctrl-btn" id="play-btn">&#9654;</div>
        <div class="ctrl-btn" id="next-btn">&#9654;&#9654;</div>
      </div>
      <button id="fullscreen-btn" title="Fullscreen">&#x26F6;</button>
    </div>
    <div id="version">v2.1</div>
  </div>

</div>

<audio id="player" preload="none"></audio>

<script>
var months = ['January','February','March','April','May','June',
  'July','August','September','October','November','December'];
document.getElementById('month-label').textContent =
  'Hits of ' + months[new Date().getMonth()];

var tracks  = [];
var idx     = 0;
var playing = false;
var player  = document.getElementById('player');
var artwork = document.getElementById('artwork');
var trackTitle = document.getElementById('track-title');
var playBtn    = document.getElementById('play-btn');
var dotsEl     = document.getElementById('track-dots');

// ── dots ─────────────────────────────────────────────────────────────────────

function buildDots() {
  dotsEl.innerHTML = '';
  tracks.forEach(function(_, i) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : '');
    d.addEventListener('click', function() { playTrack(i); });
    dotsEl.appendChild(d);
  });
}

function updateDots() {
  var dots = dotsEl.querySelectorAll('.dot');
  dots.forEach(function(d, i) {
    d.className = 'dot' + (i === idx ? ' active' : '');
  });
}

// ── track display ─────────────────────────────────────────────────────────────

function showTrack(i, direction) {
  idx = ((i % tracks.length) + tracks.length) % tracks.length;
  var t = tracks[idx];
  trackTitle.textContent = t.title;
  player.src = t.audio;
  updateDots();

  if (direction) {
    // animate out
    artwork.className = direction === 'next' ? 'swipe-left' : 'swipe-right';
    var newSrc = t.image || '';
    setTimeout(function() {
      artwork.src = newSrc;
      artwork.style.display = newSrc ? 'block' : 'none';
      artwork.className = direction === 'next' ? 'swipe-in-left' : 'swipe-in-right';
    }, 220);
  } else {
    artwork.className = '';
    artwork.src = t.image || '';
    artwork.style.display = t.image ? 'block' : 'none';
  }
}

// ── playback ──────────────────────────────────────────────────────────────────

function setPlayBtn(isPlaying) {
  playBtn.innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
}

function playTrack(i, direction) {
  showTrack(i, direction);
  playing = true;
  setPlayBtn(true);
  player.play().catch(function() {
    playing = false;
    setPlayBtn(false);
  });
}

player.addEventListener('ended', function() {
  if (playing) playTrack(idx + 1, 'next');
});

// ── buttons ───────────────────────────────────────────────────────────────────

function flash(id) {
  var el = document.getElementById(id);
  el.classList.add('active');
  setTimeout(function() { el.classList.remove('active'); }, 200);
}

document.getElementById('prev-btn').addEventListener('click', function() {
  flash('prev-btn');
  if (player.currentTime > 3) {
    player.currentTime = 0;
    if (playing) player.play();
  } else {
    playTrack(idx - 1, 'prev');
  }
});

playBtn.addEventListener('click', function() {
  flash('play-btn');
  if (playing) {
    playing = false;
    player.pause();
    setPlayBtn(false);
  } else {
    playTrack(idx, null);
  }
});

document.getElementById('next-btn').addEventListener('click', function() {
  flash('next-btn');
  playTrack(idx + 1, 'next');
});

// ── fullscreen ────────────────────────────────────────────────────────────────

var fsBtn = document.getElementById('fullscreen-btn');

function updateFsBtn() {
  fsBtn.innerHTML = document.fullscreenElement ? '&#x2715;' : '&#x26F6;';
}

fsBtn.addEventListener('click', function() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(function() {});
  } else {
    document.exitFullscreen().catch(function() {});
  }
});

document.addEventListener('fullscreenchange', updateFsBtn);

// ── swipe ─────────────────────────────────────────────────────────────────────

var swipeStartX = 0;
var swipeStartY = 0;
var swipeActive = false;

document.addEventListener('touchstart', function(e) {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swipeActive = true;
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (!swipeActive) return;
  var dx = e.touches[0].clientX - swipeStartX;
  var dy = e.touches[0].clientY - swipeStartY;
  // cancel if more vertical than horizontal
  if (Math.abs(dy) > Math.abs(dx)) { swipeActive = false; }
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!swipeActive) return;
  swipeActive = false;
  var dx = e.changedTouches[0].clientX - swipeStartX;
  var dy = e.changedTouches[0].clientY - swipeStartY;
  if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
  if (dx < 0) {
    playTrack(idx + 1, 'next');
  } else {
    if (player.currentTime > 3) {
      player.currentTime = 0;
      if (playing) player.play();
    } else {
      playTrack(idx - 1, 'prev');
    }
  }
}, { passive: true });

// ── load tracks ───────────────────────────────────────────────────────────────

var xhr = new XMLHttpRequest();
xhr.open('GET', 'tracks.json?v=' + Date.now(), true);
xhr.onload = function() {
  if (xhr.status === 200) {
    try { tracks = JSON.parse(xhr.responseText); } catch(e) {}
    if (tracks.length) {
      buildDots();
      showTrack(0, null);
    }
  }
};
xhr.send();

// ── service worker ────────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
