<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Whakatu Listening Station</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  overflow: hidden;
}

#art-area {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 15%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 16px 8px;
}

#header {
  text-align: center;
  margin-bottom: 12px;
  flex-shrink: 0;
}

#station-name {
  font-family: 'Courier New', monospace;
  font-size: 23px;
  color: white;
  letter-spacing: 2px;
}

#month-label {
  font-family: Arial, sans-serif;
  font-size: 14px;
  color: #6b6560;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 8px;
}

#artwork-wrap {
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

#artwork {
  display: block;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  background: #111;
}

#controls-bar {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 15%;
  background: #111;
  border-top: 1px solid #2a2a2a;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 6px 12px;
}

#track-title {
  font-family: Arial, sans-serif;
  font-size: 20px;
  color: #f0ece4;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  margin-bottom: 6px;
  min-height: 1.2em;
}

#controls-row {
  display: flex;
  align-items: center;
}

#logo-wrap {
  flex-shrink: 0;
  margin-right: 12px;
}

#logo {
  height: 36px;
  width: auto;
  display: block;
}

#buttons {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

#status-wrap {
  flex-shrink: 0;
  width: 44px;
  text-align: right;
}

#version {
  font-family: Arial, sans-serif;
  font-size: 9px;
  color: #222;
  margin-top: 3px;
  letter-spacing: 1px;
}

.ctrl-btn {
  background: #2a2a2a;
  border: 2px solid #666;
  color: #f0ece4;
  border-radius: 10px;
  width: 68px;
  height: 40px;
  font-size: 20px;
  line-height: 36px;
  text-align: center;
  margin: 0 8px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.ctrl-btn.active {
  background: #3a3a3a;
  border-color: #c8a96e;
}
</style>
</head>
<body>

<div id="art-area">
  <div id="header">
    <div id="station-name">Whakatū Hits Listening Station</div>
    <div id="month-label"></div>
  </div>
  <div id="artwork-wrap">
    <img id="artwork" src="" alt="">
  </div>
</div>

<div id="controls-bar">
  <div id="track-title"></div>
  <div id="controls-row">
    <div id="logo-wrap">
      <img id="logo" src="logo.png" alt="Whakatu" onerror="this.style.display='none'">
    </div>
    <div id="buttons">
      <div class="ctrl-btn" id="prev-btn">&#9664;&#9664;</div>
      <div class="ctrl-btn" id="play-btn">&#9654;</div>
      <div class="ctrl-btn" id="next-btn">&#9654;&#9654;</div>
    </div>
    <div id="status-wrap">
      <div id="version">v2.0</div>
    </div>
  </div>
</div>

<audio id="player" preload="none"></audio>

<script>
var months = ['January','February','March','April','May','June',
  'July','August','September','October','November','December'];
document.getElementById('month-label').textContent =
  'Hits of ' + months[new Date().getMonth()];

var tracks = [];
var idx = 0;
var playing = false;
var player = document.getElementById('player');
var artwork = document.getElementById('artwork');
var trackTitle = document.getElementById('track-title');
var playBtn = document.getElementById('play-btn');

function setPlayBtn(isPlaying) {
  playBtn.innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
}

function showTrack(i) {
  idx = ((i % tracks.length) + tracks.length) % tracks.length;
  var t = tracks[idx];
  trackTitle.textContent = t.title;
  artwork.src = t.image || '';
  artwork.style.display = t.image ? 'block' : 'none';
  player.src = t.audio;
}

function playTrack(i) {
  showTrack(i);
  playing = true;
  setPlayBtn(true);
  player.play().catch(function() {
    playing = false;
    setPlayBtn(false);
  });
}

player.addEventListener('ended', function() {
  if (playing) playTrack(idx + 1);
});

function flash(id) {
  var el = document.getElementById(id);
  el.classList.add('active');
  setTimeout(function() { el.classList.remove('active'); }, 200);
}

document.getElementById('prev-btn').addEventListener('click', function() {
  flash('prev-btn');
  if (player.currentTime > 3) {
    player.currentTime = 0;
    if (playing) player.play();
  } else {
    playTrack(idx - 1);
  }
});

playBtn.addEventListener('click', function() {
  flash('play-btn');
  if (playing) {
    playing = false;
    player.pause();
    setPlayBtn(false);
  } else {
    playTrack(idx);
  }
});

document.getElementById('next-btn').addEventListener('click', function() {
  flash('next-btn');
  playTrack(idx + 1);
});

// Load tracks
var xhr = new XMLHttpRequest();
xhr.open('GET', 'tracks.json?v=' + Date.now(), true);
xhr.onload = function() {
  if (xhr.status === 200) {
    try { tracks = JSON.parse(xhr.responseText); } catch(e) {}
    if (tracks.length) showTrack(0);
  }
};
xhr.send();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
